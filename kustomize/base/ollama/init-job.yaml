# One-shot Job that pulls the chat and embedding models into the
# Ollama server. Runs the ollama CLI as a client against the Ollama
# Service (OLLAMA_HOST), not as its own server. Waits for the service
# to become reachable before pulling, since the Ollama pod may still
# be starting when this Job's pod starts.
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-init
  namespace: mentr
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: ollama-model-init
    spec:
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ollama-pull
          image: ollama/ollama:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: OLLAMA_HOST
              value: http://mentr-ollama:11434
          command:
            - sh
            - -c
            - |
              until ollama list >/dev/null 2>&1; do
                echo "Waiting for Ollama to become reachable...";
                sleep 5;
              done;
              echo "Pulling llama3.2:3b...";
              ollama pull llama3.2:3b;
              echo "Pulling nomic-embed-text...";
              ollama pull nomic-embed-text;
              echo "Model pull complete.";
