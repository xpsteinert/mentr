# Runs the Ollama LLM server. Serves both the chat model (llama3.2:3b)
# and the embedding model (nomic-embed-text) used by Open WebUI's RAG
# feature. Models themselves are pulled by the ollama-model-init Job,
# not baked into this image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-stack
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: http
              containerPort: 11434
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-models
