# Chat frontend with a built-in knowledge-base / RAG feature (internal
# Chroma vector store — no separate vector DB in this demo). Talks to
# Ollama over the in-cluster Service DNS name.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webui
  namespace: mentr
  labels:
    app: webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webui
  template:
    metadata:
      labels:
        app: webui
    spec:
      containers:
        - name: webui
          image: ghcr.io/open-webui/open-webui:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OLLAMA_BASE_URL
              value: http://mentr-ollama.ai-stack.svc.cluster.local:11434
            - name: RAG_EMBEDDING_ENGINE
              value: ollama
            - name: RAG_EMBEDDING_MODEL
              value: nomic-embed-text
            - name: RAG_OLLAMA_BASE_URL
              value: http://mentr-ollama.ai-stack.svc.cluster.local:11434
          volumeMounts:
            - name: webui-data
              mountPath: /app/backend/data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: webui-data
          persistentVolumeClaim:
            claimName: webui-data
