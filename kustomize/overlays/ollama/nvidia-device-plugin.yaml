# Exposes the host's GPU(s) as an allocatable `nvidia.com/gpu` resource to
# the kubelet, so the ollama Deployment's GPU resource request/limit (see
# patch-resources.yaml) can actually be scheduled. Without this DaemonSet,
# `nvidia.com/gpu` isn't a resource Kubernetes knows about, and the Ollama
# pod stays Pending ("Insufficient nvidia.com/gpu").
#
# Host prerequisites (outside this repo): NVIDIA driver + NVIDIA Container
# Toolkit installed, Docker configured with the nvidia runtime, and the k3d
# cluster created with GPU passthrough (see README's `--gpus=all` flag).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s-device-plugin:v0.14.5
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
